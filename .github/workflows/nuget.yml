name: Uno builds and NuGet packages

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: NuGet package version, for example 1.0.0 or 1.0.0-preview.1
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: uno-build-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  PACKAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || format('0.0.0-ci.{0}', github.run_number) }}

jobs:
  cross-platform:
    name: Test, WebAssembly, Android, and Linux
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up .NET 10 and workloads
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
          workloads: android, wasm-tools
      - name: Run portable tests
        run: dotnet test LiquidGlassGallery.Tests/LiquidGlassGallery.Tests.csproj --configuration Release
      - name: Build WebAssembly demo and libraries
        run: dotnet build LiquidGlassGallery/LiquidGlassGallery.csproj --configuration Release --framework net10.0-browserwasm
      - name: Build Android demo and libraries
        run: dotnet build LiquidGlassGallery/LiquidGlassGallery.csproj --configuration Debug --framework net10.0-android
      - name: Build Linux desktop demo and libraries
        run: dotnet build LiquidGlassGallery/LiquidGlassGallery.csproj --configuration Release --framework net10.0-desktop

  apple:
    name: Build iOS demo and libraries
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select Xcode 26.6
        run: sudo xcode-select --switch /Applications/Xcode_26.6.app/Contents/Developer
      - name: Set up .NET 10 and iOS
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
          workloads: ios
      - name: Build iOS simulator demo and libraries
        run: dotnet build LiquidGlassGallery/LiquidGlassGallery.csproj --configuration Debug --framework net10.0-ios -p:TargetFrameworks=net10.0-ios -p:RuntimeIdentifier=iossimulator-arm64

  winui:
    name: Build WinUI 3 demo and libraries
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
      - name: Build WinUI 3 demo and libraries
        shell: pwsh
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) { throw "Visual Studio MSBuild was not found." }
          & $msbuild LiquidGlassGallery/LiquidGlassGallery.csproj /restore /target:Build /property:Configuration=Release /property:TargetFramework=net10.0-windows10.0.26100 /property:TargetFrameworks=net10.0-windows10.0.26100
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  package-base:
    name: Pack portable, mobile, WebAssembly, and desktop assets
    needs: [cross-platform, apple, winui]
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Select Xcode 26.6
        run: sudo xcode-select --switch /Applications/Xcode_26.6.app/Contents/Developer
      - name: Set up .NET 10 and workloads
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
          workloads: android, ios, wasm-tools
      - name: Validate package version
        shell: bash
        run: |
          if [[ ! "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid NuGet version: $PACKAGE_VERSION" >&2
            exit 1
          fi
      - name: Create base NuGet packages
        run: |
          mkdir -p artifacts/packages
          for project in Uno.Themes.LiquidGlass CommunityToolkit.LiquidGlass DevWinUI.LiquidGlass; do
            dotnet pack "$project/$project.csproj" --configuration Release --output artifacts/packages -p:PackageVersion="$PACKAGE_VERSION"
          done
      - name: Upload base packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-base-${{ env.PACKAGE_VERSION }}
          path: artifacts/packages/*.*nupkg
          if-no-files-found: error

  package-windows:
    name: Pack WinUI 3 assets
    needs: [cross-platform, apple, winui]
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
      - name: Create Windows-only NuGet packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/packages | Out-Null
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) { throw "Visual Studio MSBuild was not found." }
          foreach ($project in @('Uno.Themes.LiquidGlass', 'CommunityToolkit.LiquidGlass', 'DevWinUI.LiquidGlass')) {
            & $msbuild "$project/$project.csproj" /restore /target:Pack /property:Configuration=Release /property:PackageOutputPath="$pwd/artifacts/packages" /property:PackageVersion="$env:PACKAGE_VERSION" /property:TargetFrameworks=net10.0-windows10.0.26100
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
      - name: Upload Windows packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-windows-${{ env.PACKAGE_VERSION }}
          path: artifacts/packages/*.*nupkg
          if-no-files-found: error

  package:
    name: Merge and verify all-platform packages
    needs: [package-base, package-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download base packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-base-${{ env.PACKAGE_VERSION }}
          path: artifacts/base
      - name: Download Windows packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-windows-${{ env.PACKAGE_VERSION }}
          path: artifacts/windows
      - name: Merge platform packages
        run: python3 eng/merge-platform-packages.py artifacts/base artifacts/windows artifacts/packages
      - name: Verify package targets
        shell: bash
        run: |
          shopt -s nullglob
          packages=(artifacts/packages/*.nupkg)
          symbols=(artifacts/packages/*.snupkg)
          test ${#packages[@]} -eq 3
          test ${#symbols[@]} -eq 3
          for package in "${packages[@]}"; do
            listing=$(unzip -Z1 "$package")
            for tfm in net10.0 net10.0-android net10.0-ios net10.0-windows net10.0-browserwasm net10.0-desktop; do
              grep -q "^lib/${tfm}" <<<"$listing" || { echo "$package is missing $tfm" >&2; exit 1; }
            done
          done
          for package in "${packages[@]}" "${symbols[@]}"; do unzip -t "$package" >/dev/null; done
      - name: Upload packages for review
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nuget-packages-${{ env.PACKAGE_VERSION }}
          path: artifacts/packages/*.*nupkg
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish to NuGet.org
    if: github.event_name == 'workflow_dispatch'
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: nuget.org
      url: https://www.nuget.org/profiles/${{ vars.NUGET_USER }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
      - name: Download approved packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nuget-packages-${{ env.PACKAGE_VERSION }}
          path: artifacts/packages
      - name: Sign in to NuGet.org with trusted publishing
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Publish packages
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source https://api.nuget.org/v3/index.json --skip-duplicate
